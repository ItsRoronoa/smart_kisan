<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Kisan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef2f3;
}

/* AUTH */
#authPage {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(green, darkgreen);
}

.auth-box {
    background: white;
    padding: 35px;
    border-radius: 15px;
    text-align: center;
    width: 280px;
}

.auth-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

.auth-box button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

.switch {
    color: blue;
    cursor: pointer;
    margin-top: 10px;
}

/* DASHBOARD */
#dashboard { display: none; }

/* HEADER */
header {
    background: #2e7d32;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    width: 45px;
    margin-right: 10px;
}

/* MAIN */
.main {
    padding: 30px;
    text-align: center;
}

/* SCAN BUTTON */
.scan-btn {
    background: #ff9800;
    color: white;
    border: none;
    padding: 25px 40px;
    font-size: 22px;
    border-radius: 60px;
    cursor: pointer;
    margin-bottom: 30px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* CARDS */
.cards-container {
    max-width: 800px;
    margin: auto;
}

.card {
    background: white;
    padding: 25px;
    margin: 15px 0;
    border-radius: 15px;
    font-size: 18px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
    border-left: 6px solid green;
    text-align: left;
}

/* FOOTER */
footer {
    background: #2e7d32;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    font-size: 16px;
}
</style>

</head>

<body>

<!-- AUTH PAGE -->

<div id="authPage">
    <div class="auth-box">
        <h2 id="formTitle">Login</h2>

```
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="authBtn" onclick="handleAuth()">Login</button>

    <div class="switch" id="toggleText" onclick="toggleForm()">
        Don't have account? Sign Up
    </div>
</div>
```

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<header>
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/2909/2909767.png">
        <h2>Smart Kisan</h2>
    </div>
    <div>
        <span id="location">Loading...</span> |
        <span id="temp">--°C</span>
    </div>
</header>

<div class="main">

```
<button class="scan-btn" onclick="scanCrop()">
    📷 Scan Crop
</button>

<input type="file" id="fileInput" hidden onchange="processImage()">

<div class="cards-container">

    <div class="card">
        🌱 <b>Field Health:</b>
        <p id="health">-</p>
    </div>

    <div class="card">
        📈 <b>Growth Forecast:</b>
        <p id="forecast">-</p>
    </div>

    <div class="card">
        🌍 <b>Soil & Weather:</b>
        <p id="soil">-</p>
    </div>

    <div class="card">
        ⚠ <b>Alerts & Advice:</b>
        <p id="alerts">-</p>
    </div>

    <div class="card">
        ✅ <b>Task List:</b>
        <p id="tasks">-</p>
    </div>

</div>
```

</div>

<footer>
    📞 Contact: +91 9876543210 <br><br>
    📧 Email: smartkisan@email.com
</footer>

</div>

<script>

// AUTH SYSTEM
let isLogin = true;

function toggleForm() {
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Sign Up";
    document.getElementById("authBtn").innerText = isLogin ? "Login" : "Sign Up";

    document.getElementById("toggleText").innerText =
        isLogin
        ? "Don't have account? Sign Up"
        : "Already have account? Login";
}

// 🔥 CONNECTED LOGIN/SIGNUP
function handleAuth() {

    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(!email || !pass){
        alert("Please fill all fields");
        return;
    }

    let url = isLogin ? "/login" : "/signup";

    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: pass
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if(data.message.includes("successful") && isLogin){
            startApp();
        }
    });
}

function startApp() {
    document.getElementById("authPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    getLocation();
}

// LOCATION + WEATHER (unchanged)
function getLocation() {
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(r => r.json())
            .then(d => {
                document.getElementById("location").innerText =
                    (d.address.village || "Village") + ", " + d.address.state;
            });

            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
            .then(r => r.json())
            .then(d => {
                document.getElementById("temp").innerText =
                    d.current_weather.temperature + "°C";
            });
        });
    }
}

// SCAN
function scanCrop() {
    document.getElementById("fileInput").click();
}

// 🔥 CONNECTED TO ML BACKEND
function processImage() {

    let file = document.getElementById("fileInput").files[0];

    if(!file){
        alert("Please select image");
        return;
    }

    let formData = new FormData();
    formData.append("image", file);

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("health").innerText =
            "Prediction: " + data.result;

        document.getElementById("forecast").innerText =
            "AI analyzed your crop";

        document.getElementById("soil").innerText =
            "Based on uploaded image";

        document.getElementById("alerts").innerText =
            "Follow precautions if disease detected";

        document.getElementById("tasks").innerText =
            "Take necessary farming steps";
    });
}

</script>

</body>
</html>
